<svg width="1600" height="260" viewBox="0 0 1600 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000000; }
    .border { stroke: #1C1C1E; stroke-width: 1; fill: none; }
    .accent-dot { fill: #3B82F6; }
    .accent-line { stroke: #1C1C1E; stroke-width: 1.5; }
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 4px; }
    .headline { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 26px; font-weight: 700; fill: #FFFFFF; letter-spacing: -0.5px; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 400; fill: #A1A1AA; }
    .link { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 600; fill: #8A8A93; transition: fill 0.25s ease; cursor: pointer; }
    .link:hover { fill: #FFFFFF; }
  </style>

  <!-- Background Canvas -->
  <rect width="1600" height="260" class="bg"/>
  <rect x="0.5" y="0.5" width="1599" height="259" rx="16" class="border"/>

  <!-- Left Symmetrical Anchor Line -->
  <line x1="112" y1="48" x2="112" y2="212" class="accent-line" />
  <circle cx="112" cy="48" r="3" class="accent-dot" />

  <!-- Layout Group (Left Margined at 160px) -->
  <text x="160" y="64" class="protocol">CONNECT</text>
  
  <text x="160" y="110" class="headline">Let's construct the future of intelligent systems.</text>
  
  <text x="160" y="146" class="desc">Open to research collaborations, tool building, and internships.</text>

  <!-- CTA Links -->
