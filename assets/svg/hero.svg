<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000000; }
    .border { stroke: #1C1C1E; stroke-width: 1; fill: none; }
    .accent-dot { fill: #3B82F6; }
    .accent-line { stroke: #1C1C1E; stroke-width: 1.5; }
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 4px; }
    .name { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 64px; font-weight: 800; fill: #FFFFFF; letter-spacing: -2px; }
    .title { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 26px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.5px; }
    .brand-statement { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 20px; font-weight: 400; fill: #D4D4D8; line-height: 1.5; }
    .supporting { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 400; fill: #71717A; }
    .link { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 600; fill: #8A8A93; transition: fill 0.25s ease; cursor: pointer; }
    .link:hover { fill: #FFFFFF; }
  </style>

  <!-- Background Canvas -->
  <rect width="1600" height="520" class="bg"/>
  <rect x="0.5" y="0.5" width="1599" height="519" rx="16" class="border"/>

