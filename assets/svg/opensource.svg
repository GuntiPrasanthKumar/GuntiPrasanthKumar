  <text x="490" y="777" font-family="-apple-system,BlinkMacSystemFont,'Outfit','Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Continuous Learning</text>
  <text x="490" y="800" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#9A9A9A">Every week I learn something that</text>
  <text x="490" y="820" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#9A9A9A">makes me a better engineer.</text>
  <text x="490" y="848" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#9A9A9A">Learning compounds over time.</text>

  <!-- Col 3 -->
