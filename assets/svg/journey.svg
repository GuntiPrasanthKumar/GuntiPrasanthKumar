<svg width="800" height="490" viewBox="0 0 800 490" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .bg { fill: #0A0A0A; stroke: #3F3F46; stroke-width: 1; rx: 8px; }
    .label-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #71717A; letter-spacing: 1.5px; }
    .item { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #EDEDED; text-anchor: middle; }
    .item-highlight { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #3B82F6; text-anchor: middle; }
    .arrow { fill: #71717A; font-family: sans-serif; font-size: 14px; text-anchor: middle; }
    .tag { fill: #121212; stroke: #3B82F6; stroke-width: 1; rx: 4px; }
  </style>

  <!-- Defs -->
  <defs>
    <linearGradient id="top-border" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0A"/>
      <stop offset="0.3" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="0.7" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Section Label -->
  <text x="56" y="36" class="label-header">CURRENT JOURNEY</text>

  <!-- Card Background -->
  <rect x="0.5" y="48.5" width="799" height="430" class="bg"/>

  <!-- Subtle Top Gradient Border -->
  <path d="M 0 49 L 800 49" stroke="url(#top-border)" stroke-width="2" stroke-linecap="round"/>

  <!-- Timeline Flow -->
  <!-- Machine Learning -->
  <text x="400" y="90" class="item">Machine Learning</text>
  <text x="400" y="118" class="arrow">↓</text>

  <!-- Deep Learning -->
  <text x="400" y="146" class="item">Deep Learning</text>
  <text x="400" y="174" class="arrow">↓</text>

  <!-- LLMs -->
  <text x="400" y="202" class="item">LLMs</text>
  <text x="400" y="230" class="arrow">↓</text>

  <!-- RAG -->
  <text x="400" y="258" class="item">RAG</text>
  <text x="400" y="286" class="arrow">↓</text>

  <!-- LangGraph -->
  <text x="400" y="314" class="item">LangGraph</text>
  <text x="400" y="342" class="arrow">↓</text>

  <!-- MCP -->
  <text x="400" y="370" class="item">MCP</text>
  <text x="400" y="398" class="arrow">↓</text>

  <!-- Agentic AI (Highlight Capsule) -->
  <rect x="340" y="420" width="120" height="30" class="tag"/>
  <text x="400" y="440" class="item-highlight">Agentic AI</text>
</svg>
