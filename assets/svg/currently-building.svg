<svg width="800" height="260" viewBox="0 0 800 260" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles and keyframe animations -->
  <style>
    .bg { fill: #0A0A0A; stroke: #27272A; stroke-width: 1; rx: 8px; }
    
    /* Sequential Fade-in Animations */
    .fade-item { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.3s; }
    .delay-3 { animation-delay: 0.5s; }
    .delay-4 { animation-delay: 0.7s; }

    .label-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #71717A; letter-spacing: 1.5px; }
    .project-title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 28px; font-weight: 700; fill: #EDEDED; letter-spacing: -0.5px; }
    .project-type { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.1px; }
    .project-desc { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 400; fill: #A1A1AA; }
    
    .status-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #10B981; letter-spacing: 1px; }
    .highlight-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 400; fill: #EDEDED; }
    .highlight-bullet { fill: #3B82F6; }
    
    /* Tag Styling and Hover Effect */
    .tag-bg { fill: #121212; stroke: #27272A; stroke-width: 1; rx: 5px; transition: stroke 0.3s, fill 0.3s; }
    .tag-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 500; fill: #EDEDED; text-anchor: middle; }
    .tag:hover .tag-bg { stroke: #3B82F6; fill: #161B22; }

    /* Active Green Neon Border Light Trail Animation */
    .border-trace {
      stroke: #10B981;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 180 1940;
      animation: traceGreen 7s linear infinite;
    }

    /* Background Scanner Bar */
    .scanner {
      animation: scan 8s cubic-bezier(0.4, 0, 0.2, 1) infinite 1s;
    }

    /* Green Status Dot Pulse Ring */
    .pulse-ring { transform-origin: 611px 44px; animation: ringGlow 2.5s ease-out infinite; }

    /* Custom Vector Logo Animations */
    .logo-core { transform-origin: 700px 95px; animation: logoHeartbeat 3s ease-in-out infinite; }
    .logo-shield { transform-origin: 700px 95px; animation: shieldGlow 6s ease-in-out infinite; }

    /* Keyframes */
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes traceGreen {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -2120; }
    }
    @keyframes scan {
      0% { transform: translateX(-50px); opacity: 0; }
      10% { opacity: 0.25; }
      40% { opacity: 0.25; }
      50% { transform: translateX(850px); opacity: 0; }
      100% { transform: translateX(850px); opacity: 0; }
    }
    @keyframes ringGlow {
      0% { transform: scale(1); opacity: 1; stroke-width: 1.5px; }
      100% { transform: scale(3.5); opacity: 0; stroke-width: 0.5px; }
    }
    @keyframes logoHeartbeat {
      0%, 100% { transform: scale(1); opacity: 0.7; fill: #3B82F6; }
      50% { transform: scale(1.3); opacity: 1; fill: #10B981; filter: drop-shadow(0 0 3px #10B981); }
    }
    @keyframes shieldGlow {
      0%, 100% { filter: drop-shadow(0 0 1px rgba(16,185,129,0.2)); stroke: #3B82F6; }
      50% { filter: drop-shadow(0 0 6px rgba(16,185,129,0.6)); stroke: #10B981; }
    }
  </style>

  <!-- Defs & Patterns -->
  <defs>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#16161D" stroke-width="0.7" />
    </pattern>
    <!-- Vertical Scanner Gradient -->
    <linearGradient id="scan-grad" x1="0" y1="0" x2="4" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10B981" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#10B981" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#10B981" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background Base -->
  <rect x="0.5" y="0.5" width="799" height="259" class="bg"/>

  <!-- Scanning Grid Pattern -->
  <rect x="1" y="1" width="798" height="258" fill="url(#grid)" rx="8" />

  <!-- Animated Scanner Bar -->
  <rect x="0" y="1" width="4" height="258" fill="url(#scan-grad)" class="scanner" />

  <!-- Glowing Border Light Trail (Perimeter = 2120) -->
  <rect x="0.5" y="0.5" width="799" height="259" fill="none" class="border-trace" rx="8" />

  <!-- Section Label & Animated Status Dot -->
  <text x="56" y="48" class="label-header fade-item delay-1">CURRENTLY BUILDING</text>
  
  <g class="fade-item delay-1">
    <g transform="translate(605, 38)">
      <circle cx="6" cy="6" r="4" fill="#10B981" />
      <circle cx="6" cy="6" r="4" fill="none" stroke="#10B981" stroke-width="1.5" class="pulse-ring" />
      <text x="20" y="11" class="status-text">ACTIVE DEVELOPMENT</text>
    </g>
  </g>

  <!-- Project Title, Subtitle, and Custom Secure Assessment Logo -->
  <g class="fade-item delay-2">
    <text x="56" y="80" class="project-title">SkillTrove</text>
    <text x="56" y="102" class="project-type">AI-Powered Learning &amp; Assessment Platform</text>
    <text x="56" y="126" class="project-desc">Building an intelligent learning platform combining adaptive assessments and secure AI proctoring.</text>

    <!-- SkillTrove Secure Proctoring Shield Vector Graphic (Right Balanced) -->
    <g>
      <!-- Shield Base -->
      <path class="logo-shield" d="M685,83 L700,77 L715,83 L715,95 C715,106 700,114 700,114 C700,114 685,106 685,95 Z" stroke="#3B82F6" stroke-width="1.5" fill="none" />
      
      <!-- Network Nodes (Security Web) -->
      <line x1="700" y1="95" x2="690" y2="88" stroke="#27272A" stroke-width="1" />
      <line x1="700" y1="95" x2="710" y2="88" stroke="#27272A" stroke-width="1" />
      <line x1="700" y1="95" x2="700" y2="108" stroke="#27272A" stroke-width="1" />
      
      <!-- Central Active Node -->
      <circle cx="700" cy="95" r="3.5" fill="#3B82F6" class="logo-core" />
    </g>
  </g>

  <!-- 2-Column Highlights Grid -->
  <g class="fade-item delay-3">
    <!-- Column 1 -->
    <g transform="translate(56, 144)">
      <circle cx="4" cy="6" r="2.5" class="highlight-bullet"/>
      <text x="16" y="10" class="highlight-text">Adaptive Bloom's Taxonomy Assessments</text>
      
      <circle cx="4" cy="26" r="2.5" class="highlight-bullet"/>
      <text x="16" y="30" class="highlight-text">Secure AI Proctoring (Face, Eye &amp; Head Tracking)</text>
    </g>

    <!-- Column 2 -->
    <g transform="translate(430, 144)">
      <circle cx="4" cy="6" r="2.5" class="highlight-bullet"/>
      <text x="16" y="10" class="highlight-text">Coding, Aptitude &amp; Reasoning Engines</text>
      
      <circle cx="4" cy="26" r="2.5" class="highlight-bullet"/>
      <text x="16" y="30" class="highlight-text">Real-time Performance Analytics &amp; Feedback</text>
    </g>
  </g>

  <!-- Technology Stack Tags (With Interactive Hover Animations) -->
  <g class="fade-item delay-4" transform="translate(56, 200)">
    <!-- React 19 -->
    <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank" class="tag">
      <rect width="72" height="24" class="tag-bg" />
      <text x="36" y="16" class="tag-text">React 19</text>
    </a>
    <!-- Node.js -->
    <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank" class="tag" transform="translate(80, 0)">
      <rect width="68" height="24" class="tag-bg" />
      <text x="34" y="16" class="tag-text">Node.js</text>
    </a>
    <!-- MongoDB -->
    <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank" class="tag" transform="translate(156, 0)">
      <rect width="76" height="24" class="tag-bg" />
      <text x="38" y="16" class="tag-text">MongoDB</text>
    </a>
    <!-- Gemini API -->
    <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank" class="tag" transform="translate(240, 0)">
      <rect width="84" height="24" class="tag-bg" />
      <text x="42" y="16" class="tag-text">Gemini API</text>
    </a>
    <!-- TensorFlow.js -->
    <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank" class="tag" transform="translate(332, 0)">
      <rect width="98" height="24" class="tag-bg" />
      <text x="49" y="16" class="tag-text">TensorFlow.js</text>
    </a>
    <!-- Tailwind CSS -->
    <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank" class="tag" transform="translate(438, 0)">
      <rect width="94" height="24" class="tag-bg" />
      <text x="47" y="16" class="tag-text">Tailwind CSS</text>
    </a>
  </g>
</svg>
