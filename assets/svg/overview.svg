<svg width="1600" height="1600" viewBox="0 0 1600 1600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000000; }
    .border { stroke: #1C1C1E; stroke-width: 1; fill: none; }
    .accent-dot { fill: #3B82F6; }
    .accent-line { stroke: #1C1C1E; stroke-width: 1.5; }
    
    /* Layout Dividers */
    .divider { stroke: #1C1C1E; stroke-width: 1; }
    
    /* Typography Styles */
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 4px; }
    .headline { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 32px; font-weight: 700; fill: #FFFFFF; letter-spacing: -1px; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 400; fill: #A1A1AA; line-height: 1.6; }
    
    /* Column Grid Styles */
    .col-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 12px; font-weight: 700; fill: #71717A; letter-spacing: 2px; }
    .col-item { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #EDEDED; }
    .bullet { fill: #3B82F6; }
    .bullet-green { fill: #10B981; }

    /* Project / Focus Details */
    .focus-title { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 36px; font-weight: 800; fill: #FFFFFF; letter-spacing: -1.5px; }
    .focus-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 18px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.5px; }
    .status-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 11px; font-weight: 700; fill: #10B981; letter-spacing: 1.5px; }

    /* Tag Styling */
    .tag-bg { fill: #0A0A0A; stroke: #1C1C1E; stroke-width: 1; rx: 6px; }
    .tag-text { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 12px; font-weight: 600; fill: #EDEDED; text-anchor: middle; }
    
    /* Skill Matrix Headers */
    .matrix-col-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 12px; font-weight: 700; fill: #71717A; letter-spacing: 2px; }
    .matrix-item { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #EDEDED; }
    .matrix-sub { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 11px; font-weight: 400; fill: #52525B; }
  </style>

  <!-- Defs for Hardware-Accelerated glows -->
  <defs>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Canvas -->
  <rect width="1600" height="1600" class="bg"/>
  <rect x="0.5" y="0.5" width="1599" height="1599" rx="16" class="border"/>

  <!-- Left Symmetrical Anchor Line -->
  <line x1="112" y1="64" x2="112" y2="1536" class="accent-line" />
  <circle cx="112" cy="64" r="3" class="accent-dot" />

  <!-- ================= SECTION 01: IDENTITY ================= -->
  <g>
    <text x="160" y="80" class="protocol">IDENTITY</text>
    <text x="160" y="132" class="headline">Building intelligent software that solves real-world problems.</text>
    <text x="160" y="174" class="desc">I am an Information Technology undergraduate passionate about Artificial Intelligence and modern software engineering.</text>
    <text x="160" y="198" class="desc">My focus is building production-ready AI applications that combine machine learning, full-stack development and thoughtful user experiences.</text>

    <!-- 3-Column Grid -->
    <g>
      <text x="160" y="260" class="col-header">CAREER DIRECTION</text>
      <circle cx="164" cy="290" r="2.5" class="bullet" />
      <text x="180" y="295" class="col-item">AI Engineering</text>
      <circle cx="164" cy="318" r="2.5" class="bullet" />
      <text x="180" y="323" class="col-item">Full Stack Development</text>
      <circle cx="164" cy="346" r="2.5" class="bullet" />
      <text x="180" y="351" class="col-item">Agentic AI</text>
    </g>
    <g>
      <text x="600" y="260" class="col-header">ACTIVE LEARNING</text>
      <circle cx="604" cy="290" r="2.5" class="bullet" />
      <text x="620" y="295" class="col-item">Machine Learning</text>
      <circle cx="604" cy="318" r="2.5" class="bullet" />
      <text x="620" y="323" class="col-item">Deep Learning</text>
      <circle cx="604" cy="346" r="2.5" class="bullet" />
      <text x="620" y="351" class="col-item">Large Language Models</text>
    </g>
    <g>
      <text x="1040" y="260" class="col-header">PREPARING FOR</text>
      <circle cx="1044" cy="290" r="2.5" class="bullet" />
      <text x="1060" y="295" class="col-item">Retrieval-Augmented Generation (RAG)</text>
      <circle cx="1044" cy="318" r="2.5" class="bullet" />
      <text x="1060" y="323" class="col-item">LangGraph Agents</text>
      <circle cx="1044" cy="346" r="2.5" class="bullet" />
      <text x="1060" y="351" class="col-item">Model Context Protocol (MCP)</text>
    </g>
  </g>

  <line x1="160" y1="390" x2="1440" y2="390" class="divider" />

  <!-- ================= SECTION 02: CURRENT FOCUS (SkillTrove) ================= -->
  <g>
    <text x="160" y="440" class="protocol">CURRENT FOCUS</text>
    
    <!-- Active Status Pulse -->
    <g transform="translate(605, 428)">
      <circle cx="6" cy="6" r="4" fill="#10B981" />
      <circle cx="6" cy="6" r="4" fill="none" stroke="#10B981" stroke-width="1.5">
        <animate attributeName="r" values="4;14;4" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="stroke-opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
      </circle>
      <text x="24" y="11" class="status-text">ACTIVE DEVELOPMENT</text>
    </g>

    <text x="160" y="496" class="focus-title">SkillTrove</text>
    <text x="160" y="524" class="focus-subtitle">AI-Powered Learning &amp; Assessment Platform</text>
    <text x="160" y="556" class="desc">Building an intelligent learning platform combining adaptive assessments and secure AI proctoring.</text>

    <!-- Highlights -->
    <g>
      <text x="160" y="610" class="col-header">PLATFORM CAPABILITIES</text>
      
      <circle cx="164" cy="640" r="2.5" class="bullet-green" />
      <text x="180" y="645" class="col-item">Adaptive Bloom's Taxonomy Assessments</text>
      
      <circle cx="164" cy="668" r="2.5" class="bullet-green" />
      <text x="180" y="673" class="col-item">Secure AI Proctoring (Face &amp; Tracking)</text>
    </g>
    <g>
      <circle cx="704" cy="640" r="2.5" class="bullet-green" />
      <text x="720" y="645" class="col-item">Coding, Aptitude &amp; Reasoning Engines</text>
      
      <circle cx="704" cy="668" r="2.5" class="bullet-green" />
      <text x="720" y="673" class="col-item">Real-time Performance Analytics &amp; Feedback</text>
    </g>

    <!-- Tags -->
    <g transform="translate(160, 716)">
      <rect width="90" height="26" class="tag-bg" />
      <text x="45" y="17" class="tag-text">React 19</text>
      
      <rect x="102" width="90" height="26" class="tag-bg" />
      <text x="147" y="17" class="tag-text">Node.js</text>
      
      <rect x="204" width="100" height="26" class="tag-bg" />
      <text x="254" y="17" class="tag-text">MongoDB</text>
      
      <rect x="316" width="110" height="26" class="tag-bg" />
      <text x="371" y="17" class="tag-text">Gemini API</text>
      
      <rect x="438" width="120" height="26" class="tag-bg" />
      <text x="498" y="17" class="tag-text">TensorFlow.js</text>
    </g>
  </g>

  <line x1="160" y1="782" x2="1440" y2="782" class="divider" />

  <!-- ================= SECTION 03: ENGINEERING PHILOSOPHY ================= -->
  <g>
    <text x="160" y="832" class="protocol">ENGINEERING PHILOSOPHY</text>
    <text x="160" y="880" class="desc">As an Information Technology undergraduate, I specialize in the integration of machine learning models with robust</text>
    <text x="160" y="904" class="desc">full-stack architectures. My vision is centered on engineering next-generation autonomous AI systems that solve</text>
    <text x="160" y="928" class="desc">complex computational problems at scale. Simplicity, user utility, and rigorous execution are my primary design values.</text>
  </g>

  <line x1="160" y1="978" x2="1440" y2="978" class="divider" />

  <!-- ================= SECTION 04: SKILL MATRIX ================= -->
  <g>
    <text x="160" y="1028" class="protocol">SKILL MATRIX</text>

    <!-- Column Dividers -->
    <line x1="560" y1="1070" x2="560" y2="1500" class="divider" />
    <line x1="1000" y1="1070" x2="1000" y2="1500" class="divider" />

    <!-- Column 1: AI & ML -->
    <g>
      <text x="160" y="1080" class="matrix-col-header">AI &amp; MACHINE LEARNING</text>
      
      <text x="160" y="1120" class="matrix-item">Python</text>
      <text x="160" y="1136" class="matrix-sub">Numerical &amp; Statistical Modeling</text>
      
      <text x="160" y="1176" class="matrix-item">FastAPI</text>
      <text x="160" y="1192" class="matrix-sub">High-Performance ML Service Gateway</text>
      
      <text x="160" y="1232" class="matrix-item">Gemini API / OpenAI API</text>
      <text x="160" y="1248" class="matrix-sub">Large Language Model Integrations</text>
      
      <text x="160" y="1288" class="matrix-item">LangChain &amp; LangGraph</text>
      <text x="160" y="1304" class="matrix-sub">Autonomous Agents &amp; State Workflows</text>
    </g>

    <!-- Column 2: Software Engineering -->
    <g>
      <text x="600" y="1080" class="matrix-col-header">SOFTWARE ENGINEERING</text>
      
      <text x="600" y="1120" class="matrix-item">React.js &amp; Vite</text>
      <text x="600" y="1136" class="matrix-sub">Component Architecture &amp; State Management</text>
      
      <text x="600" y="1176" class="matrix-item">JavaScript &amp; TypeScript</text>
      <text x="600" y="1192" class="matrix-sub">Universal Asynchronous Application Logic</text>
      
      <text x="600" y="1232" class="matrix-item">Node.js &amp; Express.js</text>
      <text x="600" y="1248" class="matrix-sub">Scalable Server Operations &amp; APIs</text>
      
      <text x="600" y="1288" class="matrix-item">MongoDB &amp; MySQL</text>
      <text x="600" y="1304" class="matrix-sub">NoSQL Documents &amp; Relational Datastores</text>
    </g>

    <!-- Column 3: Developer Toolkit -->
    <g>
      <text x="1040" y="1080" class="matrix-col-header">DEVELOPER TOOLKIT</text>
      
      <text x="1040" y="1120" class="matrix-item">Git &amp; GitHub</text>
      <text x="1040" y="1136" class="matrix-sub">Source Control &amp; Continuous Workflows</text>
      
      <text x="1040" y="1176" class="matrix-item">Tailwind CSS</text>
      <text x="1040" y="1192" class="matrix-sub">Utility-First Responsive Interfaces</text>
      
      <text x="1040" y="1232" class="matrix-item">Docker</text>
      <text x="1040" y="1248" class="matrix-sub">Environment Containers (Dev &amp; Deploy)</text>
      
      <text x="1040" y="1288" class="matrix-item">Vercel &amp; Render</text>
      <text x="1040" y="1304" class="matrix-sub">Cloud Distribution &amp; Server Deployment</text>
    </g>
  </g>
</svg>
