    <animate attributeName="y" values="484;470;484" dur="3.5s" repeatCount="indefinite"/>
  </rect>
  <rect x="864" y="490" width="18" height="144" rx="3" fill="url(#bar-grad)">
    <animate attributeName="height" values="144;158;144" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="y" values="490;476;490" dur="2.8s" repeatCount="indefinite"/>
  </rect>
  <rect x="888" y="478" width="18" height="156" rx="3" fill="url(#bar-grad)" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.5">
    <animate attributeName="height" values="156;170;156" dur="4.2s" repeatCount="indefinite"/>
    <animate attributeName="y" values="478;464;478" dur="4.2s" repeatCount="indefinite"/>
  </rect>
  <!-- Aug-Dec: future / projected (muted) -->
  <rect x="932" y="564" width="18" height="70" rx="3" fill="#1A1A1D" opacity="0.6"/>
  <rect x="956" y="558" width="18" height="76" rx="3" fill="#1A1A1D" opacity="0.5"/>
  <rect x="980" y="562" width="18" height="72" rx="3" fill="#1A1A1D" opacity="0.55"/>
  <rect x="1004" y="554" width="18" height="80" rx="3" fill="#1A1A1D" opacity="0.5"/>
  <rect x="1048" y="566" width="18" height="68" rx="3" fill="#1A1A1D" opacity="0.4"/>
  <rect x="1072" y="560" width="18" height="74" rx="3" fill="#1A1A1D" opacity="0.38"/>
