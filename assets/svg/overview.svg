<svg width="1600" height="1500" viewBox="0 0 1600 1500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000000; }
    .border { stroke: #1C1C1E; stroke-width: 1; fill: none; }
    .card { fill: #0A0A0A; stroke: #1C1C1E; stroke-width: 1; rx: 16px; }
    
    /* Divider lines inside cards */
    .inner-divider { stroke: #1C1C1E; stroke-width: 1; }
    
    /* Typography */
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 4px; }
    .headline { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 34px; font-weight: 800; fill: #FFFFFF; letter-spacing: -1.5px; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 400; fill: #A1A1AA; line-height: 1.6; }
    
    /* Focus Card Typography */
    .focus-title { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 40px; font-weight: 800; fill: #FFFFFF; letter-spacing: -1.5px; }
    .focus-subtitle { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 16px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.5px; }
    .status-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 11px; font-weight: 700; fill: #10B981; letter-spacing: 1.5px; }

    /* Bento Lists */
    .list-item { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; fill: #EDEDED; }
    .bullet { fill: #3B82F6; }
    
    /* Skill Matrix Headers */
    .matrix-col-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 12px; font-weight: 700; fill: #71717A; letter-spacing: 2px; }
    .matrix-item { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; fill: #FFFFFF; }
    .matrix-sub { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 11px; font-weight: 400; fill: #52525B; }
    
    /* Callout text in Philosophy */
    .callout { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; fill: #3B82F6; }
  </style>

  <!-- Background Canvas -->
  <rect width="1600" height="1500" class="bg"/>
  <rect x="0.5" y="0.5" width="1599" height="1499" rx="16" class="border"/>

  <!-- ================= ROW 1 ================= -->
  <!-- Card 1A: IDENTITY -->
  <g>
    <rect x="80" y="80" width="800" height="400" rx="16" class="card" />
    <text x="120" y="130" class="protocol">IDENTITY</text>
    <text x="120" y="185" class="headline">Building intelligent software</text>
    <text x="120" y="225" class="headline">that solves real-world problems.</text>
    
    <text x="120" y="285" class="desc">I am an Information Technology undergraduate passionate about Artificial</text>
    <text x="120" y="310" class="desc">Intelligence and modern software engineering. My focus is building</text>
    <text x="120" y="335" class="desc">production-ready AI applications that combine machine learning,</text>
    <text x="120" y="360" class="desc">full-stack development, and thoughtful user experiences.</text>
  </g>

  <!-- Card 1B: CURRENT FOCUS (SkillTrove) -->
  <g>
    <rect x="900" y="80" width="620" height="400" rx="16" class="card" />
    <text x="940" y="130" class="protocol">CURRENT FOCUS</text>
    
    <text x="940" y="185" class="focus-title">SkillTrove</text>
    <text x="940" y="220" class="focus-subtitle">AI-Powered Learning Platform</text>
    
    <text x="940" y="265" class="desc">An intelligent platform combining adaptive</text>
    <text x="940" y="290" class="desc">assessments and secure AI proctoring.</text>

    <!-- Blinking green indicator status -->
    <g>
      <circle cx="946" cy="346" r="4.5" fill="#10B981" />
      <circle cx="946" cy="346" r="4.5" fill="none" stroke="#10B981" stroke-width="1.5">
        <animate attributeName="r" values="4.5;14;4.5" dur="2.5s" repeatCount="indefinite" />
        <animate attributeName="stroke-opacity" values="1;0;1" dur="2.5s" repeatCount="indefinite" />
      </circle>
      <text x="968" y="350" class="status-text">ACTIVE DEVELOPMENT</text>
    </g>
  </g>

  <!-- ================= ROW 2 ================= -->
  <!-- Card 2A: ENGINEERING PHILOSOPHY -->
  <g>
    <rect x="80" y="500" width="600" height="420" rx="16" class="card" />
    <text x="120" y="550" class="protocol">ENGINEERING PHILOSOPHY</text>
    
    <text x="120" y="605" class="desc">Integrating machine learning models with</text>
    <text x="120" y="630" class="desc">robust full-stack architectures. My vision</text>
    <text x="120" y="655" class="desc">is centered on engineering next-generation</text>
    <text x="120" y="680" class="desc">autonomous AI systems that solve complex</text>
    <text x="120" y="705" class="desc">computational problems at scale.</text>

    <!-- Custom indicator sidebar callout -->
    <line x1="120" y1="765" x2="120" y2="845" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" />
    <text x="138" y="788" class="callout">Simplicity, user utility, and rigorous</text>
    <text x="138" y="813" class="callout">execution are my primary values.</text>
  </g>

  <!-- Card 2B: CAREER DIRECTION -->
  <g>
    <rect x="700" y="500" width="400" height="420" rx="16" class="card" />
    <text x="740" y="550" class="protocol">CAREER DIRECTION</text>
    
    <circle cx="744" cy="600" r="2.5" class="bullet" />
    <text x="760" y="605" class="list-item">AI Engineering</text>
    
    <circle cx="744" cy="636" r="2.5" class="bullet" />
    <text x="760" y="641" class="list-item">Full Stack Development</text>
    
    <circle cx="744" cy="672" r="2.5" class="bullet" />
    <text x="760" y="677" class="list-item">Agentic AI Systems</text>
  </g>

  <!-- Card 2C: CURRENT LEARNING -->
  <g>
    <rect x="1120" y="500" width="400" height="420" rx="16" class="card" />
    <text x="1160" y="550" class="protocol">CURRENT LEARNING</text>
    
    <circle cx="1164" cy="600" r="2.5" class="bullet" />
    <text x="1180" y="605" class="list-item">Machine Learning</text>
    
    <circle cx="1164" cy="636" r="2.5" class="bullet" />
    <text x="1180" y="641" class="list-item">Deep Learning</text>
    
    <circle cx="1164" cy="672" r="2.5" class="bullet" />
    <text x="1180" y="677" class="list-item">LLMs &amp; Vector RAG</text>
    
    <circle cx="1164" cy="708" r="2.5" class="bullet" />
    <text x="1180" y="713" class="list-item">LangGraph Agents</text>
    
    <circle cx="1164" cy="744" r="2.5" class="bullet" />
    <text x="1180" y="749" class="list-item">Model Context Protocol (MCP)</text>
  </g>

  <!-- ================= ROW 3: STACK MATRIX ================= -->
  <g>
    <rect x="80" y="940" width="1440" height="480" rx="16" class="card" />
    <text x="120" y="990" class="protocol">ENGINEERING STACK</text>

    <!-- Columns Dividers -->
    <line x1="530" y1="1020" x2="530" y2="1380" class="inner-divider" />
    <line x1="980" y1="1020" x2="980" y2="1380" class="inner-divider" />

    <!-- Column 1: AI & Machine Learning -->
    <g>
      <text x="120" y="1040" class="matrix-col-header">AI &amp; MACHINE LEARNING</text>
      
      <text x="120" y="1085" class="matrix-item">Python</text>
      <text x="120" y="1101" class="matrix-sub">Numerical &amp; Statistical Modeling</text>
      
      <text x="120" y="1140" class="matrix-item">FastAPI</text>
      <text x="120" y="1156" class="matrix-sub">High-Performance ML Service Gateway</text>
      
      <text x="120" y="1195" class="matrix-item">Gemini &amp; OpenAI APIs</text>
      <text x="120" y="1211" class="matrix-sub">Large Language Model Integrations</text>
      
      <text x="120" y="1250" class="matrix-item">LangChain &amp; LangGraph</text>
      <text x="120" y="1266" class="matrix-sub">Autonomous Agents &amp; State Workflows</text>
    </g>

    <!-- Column 2: Software Engineering -->
    <g>
      <text x="570" y="1040" class="matrix-col-header">SOFTWARE ENGINEERING</text>
      
      <text x="570" y="1085" class="matrix-item">React.js &amp; Vite</text>
      <text x="570" y="1101" class="matrix-sub">Component Architecture &amp; State Management</text>
      
      <text x="570" y="1140" class="matrix-item">JavaScript &amp; TypeScript</text>
      <text x="570" y="1156" class="matrix-sub">Universal Asynchronous Application Logic</text>
      
      <text x="570" y="1195" class="matrix-item">Node.js &amp; Express.js</text>
      <text x="570" y="1211" class="matrix-sub">Scalable Server Operations &amp; APIs</text>
      
      <text x="570" y="1250" class="matrix-item">MongoDB &amp; MySQL</text>
      <text x="570" y="1266" class="matrix-sub">NoSQL Documents &amp; Relational Datastores</text>
    </g>

    <!-- Column 3: Developer Toolkit -->
    <g>
      <text x="1020" y="1040" class="matrix-col-header">DEVELOPER TOOLKIT</text>
      
      <text x="1020" y="1085" class="matrix-item">Git &amp; GitHub</text>
      <text x="1020" y="1101" class="matrix-sub">Source Control &amp; Continuous Workflows</text>
      
      <text x="1020" y="1140" class="matrix-item">Tailwind CSS</text>
      <text x="1020" y="1156" class="matrix-sub">Utility-First Responsive Interfaces</text>
      
      <text x="1020" y="1195" class="matrix-item">Docker</text>
      <text x="1020" y="1211" class="matrix-sub">Environment Containers (Dev &amp; Deploy)</text>
      
      <text x="1020" y="1250" class="matrix-item">Vercel &amp; Render</text>
      <text x="1020" y="1266" class="matrix-sub">Cloud Distribution &amp; Server Deployment</text>
    </g>
  </g>
</svg>
