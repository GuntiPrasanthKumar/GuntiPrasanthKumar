  <line x1="112" y1="96" x2="112" y2="424" class="accent-line" />
  <circle cx="112" cy="96" r="3" class="accent-dot" />

  <!-- Layout Group (Left Margined at 160px) -->
  <text x="160" y="112" class="protocol">SYSTEM // INITIALIZE</text>
  
  <text x="160" y="196" class="name">Gunti Prasanth Kumar</text>
  
  <text x="160" y="252" class="title">AI Engineer | Full Stack Developer</text>
  
  <text x="160" y="308" class="brand-statement">Building production-ready AI products that solve real-world problems.</text>
  
  <text x="160" y="364" class="supporting">Information Technology Undergraduate • Aditya University • Class of 2027</text>

