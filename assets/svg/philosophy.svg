<svg width="800" height="150" viewBox="0 0 800 150" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles and native animations -->
  <style>
    .bg { fill: #0A0A0A; stroke: #27272A; stroke-width: 1; rx: 8px; }
    
    /* Fade-in animations */
    .fade-item { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.3s; }

    .label-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #71717A; letter-spacing: 1.5px; }
    .philosophy-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 400; fill: #EDEDED; line-height: 1.6; }
    
    /* Glowing highlights */
    .highlight { fill: #3B82F6; font-weight: 600; animation: textGlow 4s ease-in-out infinite; }
    
    /* Animations */
    .left-bar { animation: barPulse 4s ease-in-out infinite; }

    /* Seamless Glowing Blue Border Trace (Perimeter = 1900) */
    .border-trace {
      stroke: #3B82F6;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 150 1750;
      animation: tracePhilosophy 6s linear infinite;
    }

    /* Keyframes */
    @keyframes fadeIn { to { opacity: 1; } }
    @keyframes tracePhilosophy {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -1900; }
    }
    @keyframes barPulse {
      0%, 100% { opacity: 0.5; filter: drop-shadow(0 0 1px #3B82F6); }
      50% { opacity: 1; filter: drop-shadow(0 0 4px #3B82F6); stroke: #60A5FA; }
    }
    @keyframes textGlow {
      0%, 100% { fill: #3B82F6; }
      50% { fill: #60A5FA; }
    }
  </style>

  <!-- Defs & Hardware Accelerated Filters -->
  <defs>
    <!-- Blue Neon Glow Filter -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#16161D" stroke-width="0.7" />
    </pattern>
  </defs>

  <!-- Background Base -->
  <rect x="0.5" y="0.5" width="799" height="149" class="bg" rx="8"/>

  <!-- Grid Pattern -->
  <rect x="1" y="1" width="798" height="148" fill="url(#grid)" rx="8" />

  <!-- Glowing Border Light Trail (Perimeter = 1900) -->
  <rect x="0.5" y="0.5" width="799" height="149" fill="none" class="border-trace" rx="8" filter="url(#glow-blue)" />

  <!-- Section Label -->
  <text x="56" y="48" class="label-header fade-item delay-1">ENGINEERING PHILOSOPHY</text>

  <!-- Vertical Glowing Divider Bar -->
  <line x1="38" y1="65" x2="38" y2="128" stroke="#3B82F6" stroke-width="2.5" stroke-linecap="round" class="left-bar fade-item delay-2" />

  <!-- Philosophy Narrative -->
  <g class="fade-item delay-2">
    <text x="56" y="78" class="philosophy-text">
      As an Information Technology undergraduate (Class of 2027), I specialize in the integration of
    </text>
    <text x="56" y="100" class="philosophy-text">
      machine learning models with robust full-stack architectures. My vision is centered on engineering
    </text>
    <text x="56" y="122" class="philosophy-text">
      next-generation <tspan class="highlight">autonomous AI systems</tspan> that solve complex computational problems at scale.
    </text>
  </g>
</svg>
