<svg width="800" height="270" viewBox="0 0 800 270" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles -->
  <style>
    .bg { fill: #0A0A0A; stroke: #3F3F46; stroke-width: 1; rx: 8px; }
    .name { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 34px; font-weight: 700; fill: #EDEDED; letter-spacing: -0.5px; }
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 16px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.2px; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 13px; font-weight: 400; fill: #71717A; }
    .statement { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; font-size: 14px; font-weight: 400; fill: #A1A1AA; }
    .link-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #EDEDED; transition: fill 0.2s; }
    .link:hover .link-text { fill: #3B82F6; }
  </style>

  <!-- Defs -->
  <defs>
    <linearGradient id="top-border" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0A0A0A"/>
      <stop offset="0.3" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="0.7" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect x="0.5" y="0.5" width="799" height="269" class="bg"/>

  <!-- Subtle Top Gradient Border -->
  <path d="M 0 1 L 800 1" stroke="url(#top-border)" stroke-width="2" stroke-linecap="round"/>

  <!-- Content -->
  <text x="56" y="72" class="name">Gunti Prasanth Kumar</text>
  <text x="56" y="102" class="title">AI Engineer | Full Stack Developer</text>
  <text x="56" y="126" class="subtitle">Information Technology Undergraduate • Aditya University • Class of 2027</text>
  <text x="56" y="172" class="statement">Building production-ready AI products that solve real-world problems.</text>

  <!-- Links (Minimal Text Links) -->
  <!-- Link 1: Portfolio -->
  <a href="https://prasanth.dev" target="_blank" class="link">
    <text x="56" y="216" class="link-text">Portfolio ↗</text>
  </a>

  <!-- Link 2: LinkedIn -->
  <a href="https://linkedin.com/in/guntiprasanthkumar" target="_blank" class="link">
    <text x="168" y="216" class="link-text">LinkedIn ↗</text>
  </a>

  <!-- Link 3: Email -->
  <a href="mailto:guntiprasanthkumar@gmail.com" target="_blank" class="link">
    <text x="272" y="216" class="link-text">Email ↗</text>
  </a>
</svg>
