<svg width="1600" height="700" viewBox="0 0 1600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Canvas -->
  <rect width="1600" height="700" fill="#000000"/>
  <rect x="0.5" y="0.5" width="1599" height="699" rx="16" stroke="#1C1C1E" stroke-width="1" fill="none"/>

  <!-- Left Symmetrical Anchor Line -->
  <line x1="112" y1="48" x2="112" y2="652" stroke="#1C1C1E" stroke-width="1.5" />
  <circle cx="112" cy="48" r="3" fill="#3B82F6" />

  <!-- Section Label -->
  <text x="160" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace" font-size="13" font-weight="700" fill="#52525B" letter-spacing="4px">OPEN SOURCE</text>

  <!-- Three Placeholders Bento Cards -->
  <!-- Card 1: GitHub Stats Frame -->
  <g>
    <rect x="80" y="110" width="460" height="320" rx="12" fill="#0A0A0C" stroke="#1C1C1E" stroke-width="1" />
    <text x="310" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace" font-size="12" font-weight="700" fill="#52525B" letter-spacing="2px" text-anchor="middle">WIDGET // GITHUB STATS</text>
    <line x1="160" y1="275" x2="460" y2="275" stroke="#1C1C1E" stroke-width="1" stroke-dasharray="4 4" />
  </g>

  <!-- Card 2: GitHub Streak Frame -->
  <g>
    <rect x="570" y="110" width="460" height="320" rx="12" fill="#0A0A0C" stroke="#1C1C1E" stroke-width="1" />
    <text x="800" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace" font-size="12" font-weight="700" fill="#52525B" letter-spacing="2px" text-anchor="middle">WIDGET // CONTRIBUTION STREAK</text>
    <line x1="650" y1="275" x2="950" y2="275" stroke="#1C1C1E" stroke-width="1" stroke-dasharray="4 4" />
  </g>

  <!-- Card 3: Top Languages Frame -->
  <g>
    <rect x="1060" y="110" width="460" height="320" rx="12" fill="#0A0A0C" stroke="#1C1C1E" stroke-width="1" />
    <text x="1290" y="260" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace" font-size="12" font-weight="700" fill="#52525B" letter-spacing="2px" text-anchor="middle">WIDGET // TOP LANGUAGES</text>
    <line x1="1140" y1="275" x2="1440" y2="275" stroke="#1C1C1E" stroke-width="1" stroke-dasharray="4 4" />
  </g>

  <!-- Bottom Information Block -->
  <g>
    <text x="160" y="500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace" font-size="13" font-weight="700" fill="#52525B" letter-spacing="4px">ENGINEERING APPROACH</text>
    <text x="160" y="545" font-family="-apple-system, BlinkMacSystemFont, 'Outfit', 'Segoe UI', sans-serif" font-size="24" font-weight="700" fill="#FFFFFF" letter-spacing="-0.5px">Consistency compounds over time.</text>
    
    <text x="160" y="582" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#A1A1AA" line-height="1.6">I believe consistency compounds over time.</text>
    <text x="160" y="606" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="15" font-weight="400" fill="#A1A1AA" line-height="1.6">Every commit, experiment and project contributes to becoming a better engineer.</text>
  </g>
</svg>
