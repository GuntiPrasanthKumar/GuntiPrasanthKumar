  <text x="830" y="848" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#9A9A9A">Ship. Measure. Improve.</text>

  <!-- Col 4 -->
  <line x1="1142" y1="772" x2="1160" y2="772" stroke="#3B82F6" stroke-width="2.5"/>
