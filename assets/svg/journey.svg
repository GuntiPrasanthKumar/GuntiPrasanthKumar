<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Canvas -->
  <rect width="1600" height="900" fill="#000000"/>
  <rect x="0.5" y="0.5" width="1599" height="899" rx="16" stroke="#1C1C1E" stroke-width="1" fill="none"/>

  <!-- Left Symmetrical Anchor Line -->
  <line x1="112" y1="48" x2="112" y2="852" stroke="#1C1C1E" stroke-width="1.5" />
  <circle cx="112" cy="48" r="3" fill="#3B82F6" />

  <!-- Section Label -->
  <text x="160" y="64" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace" font-size="13" font-weight="700" fill="#52525B" letter-spacing="4px">ENGINEERING JOURNEY</text>

  <!-- Center Timeline Track -->
  <line x1="800" y1="110" x2="800" y2="670" stroke="#1C1C1E" stroke-width="1.5" stroke-dasharray="4 4" />

  <!-- Timeline Nodes -->
  <!-- Node 1: Machine Learning -->
  <circle cx="800" cy="140" r="3" fill="#27272A" />
  <text x="770" y="145" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#A1A1AA" text-anchor="end">Machine Learning</text>

  <!-- Node 2: Deep Learning -->
  <circle cx="800" cy="195" r="3" fill="#27272A" />
  <text x="820" y="200" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#A1A1AA" text-anchor="start">Deep Learning</text>

  <!-- Node 3: Large Language Models (CURRENT POSITION - Highlighted) -->
  <circle cx="800" cy="250" r="4.5" fill="#3B82F6" />
  <text x="770" y="255" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#3B82F6" text-anchor="end">Large Language Models</text>

  <!-- Node 4: Prompt Engineering (CURRENT POSITION - Highlighted) -->
  <circle cx="800" cy="305" r="4.5" fill="#3B82F6" />
  <text x="820" y="310" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#3B82F6" text-anchor="start">Prompt Engineering</text>

  <!-- Node 5: Retrieval-Augmented Generation -->
  <circle cx="800" cy="360" r="3" fill="#27272A" />
  <text x="770" y="365" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#A1A1AA" text-anchor="end">Retrieval-Augmented Generation</text>

  <!-- Node 6: LangChain -->
  <circle cx="800" cy="415" r="3" fill="#27272A" />
  <text x="820" y="420" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#A1A1AA" text-anchor="start">LangChain</text>

  <!-- Node 7: LangGraph -->
  <circle cx="800" cy="470" r="3" fill="#27272A" />
  <text x="770" y="475" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#A1A1AA" text-anchor="end">LangGraph</text>

  <!-- Node 8: Model Context Protocol (MCP) -->
  <circle cx="800" cy="525" r="3" fill="#27272A" />
  <text x="820" y="530" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#A1A1AA" text-anchor="start">Model Context Protocol (MCP)</text>

  <!-- Node 9: Multi-Agent Systems -->
  <circle cx="800" cy="580" r="3" fill="#27272A" />
  <text x="770" y="585" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="14" font-weight="500" fill="#A1A1AA" text-anchor="end">Multi-Agent Systems</text>

  <!-- Node 10: Agentic AI (TARGET HIGHLIGHT - Destination Capsule) -->
  <circle cx="800" cy="650" r="5" fill="#3B82F6" />
  <g transform="translate(800, 680)">
    <rect x="-90" y="0" width="180" height="36" rx="8" fill="#0A0A0C" stroke="#3B82F6" stroke-width="1.5" />
    <text x="0" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', sans-serif" font-size="13" font-weight="700" fill="#3B82F6" text-anchor="middle">Agentic AI</text>
  </g>

  <!-- Footnote -->
  <text x="1480" y="830" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace" font-size="12" font-weight="700" fill="#52525B" letter-spacing="2px" text-anchor="end">CONTINUOUS LEARNING</text>
</svg>
