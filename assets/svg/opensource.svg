  <rect x="748" y="515" width="18" height="119" rx="3" fill="url(#bar-grad)"/>
  <rect x="772" y="504" width="18" height="130" rx="3" fill="url(#bar-grad)">
    <animate attributeName="height" values="130;140;130" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="y" values="504;494;504" dur="4s" repeatCount="indefinite"/>
  </rect>
  <!-- Jul - peak (current, animated) -->
  <rect x="816" y="496" width="18" height="138" rx="3" fill="url(#bar-grad)">
    <animate attributeName="height" values="138;152;138" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="y" values="496;482;496" dur="3s" repeatCount="indefinite"/>
