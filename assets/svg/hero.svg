<svg width="800" height="270" viewBox="0 0 800 270" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles and native CSS animations -->
  <style>
    .bg { fill: #0A0A0A; stroke: #27272A; stroke-width: 1; rx: 8px; }
    
    /* Sequential Fade-in Animations */
    .fade-item { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .delay-1 { animation-delay: 0.2s; }
    .delay-2 { animation-delay: 0.5s; }
    .delay-3 { animation-delay: 0.8s; }
    .delay-4 { animation-delay: 1.1s; }
    .delay-5 { animation-delay: 1.4s; }

    .name { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 34px; font-weight: 700; fill: #EDEDED; letter-spacing: -0.5px; }
    .title { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 16px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.2px; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 400; fill: #71717A; }
    .statement { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 400; fill: #A1A1AA; }
    
    /* Text Link Styling */
    .link-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 600; fill: #EDEDED; transition: fill 0.2s; }
    .link:hover .link-text { fill: #3B82F6; }

    /* Seamless Glowing Neon Border Trace (Perimeter = 2136) */
    .border-trace {
      stroke: #3B82F6;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 180 1956;
      animation: trace 6s linear infinite;
    }

    /* 3D Cyber-Grid Moving Horizontals */
    .grid-line { stroke: #1F2028; stroke-width: 1; }
    .horiz-1 { animation: horizScroll 4s linear infinite; }
    .horiz-2 { animation: horizScroll 4s linear infinite 1s; }
    .horiz-3 { animation: horizScroll 4s linear infinite 2s; }
    .horiz-4 { animation: horizScroll 4s linear infinite 3s; }

    /* Keyframes */
    @keyframes fadeIn {
      to { opacity: 1; }
    }
    @keyframes trace {
      0% { stroke-dashoffset: 0; }
      100% { stroke-dashoffset: -2136; }
    }
    @keyframes horizScroll {
      0% { transform: translateY(0); opacity: 0.1; }
      20% { opacity: 0.35; }
      80% { opacity: 0.35; }
      100% { transform: translateY(150px); opacity: 0; }
    }
  </style>

  <!-- Defs & Hardware Accelerated Filters -->
  <defs>
    <!-- Cyan/Blue Glow Filter -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Base -->
  <rect x="0.5" y="0.5" width="799" height="269" class="bg"/>

  <!-- ================= 3D CYBER-GRID BACKGROUND ================= -->
  <!-- Vanishing point grid converging lines -->
  <g opacity="0.3">
    <!-- Perspective lines originating from center horizon (400, 100) to bottom -->
    <line x1="400" y1="100" x2="-200" y2="270" class="grid-line" />
    <line x1="400" y1="100" x2="0" y2="270" class="grid-line" />
    <line x1="400" y1="100" x2="150" y2="270" class="grid-line" />
    <line x1="400" y1="100" x2="300" y2="270" class="grid-line" />
    <line x1="400" y1="100" x2="400" y2="270" class="grid-line" stroke-width="1.5" />
    <line x1="400" y1="100" x2="500" y2="270" class="grid-line" />
    <line x1="400" y1="100" x2="650" y2="270" class="grid-line" />
    <line x1="400" y1="100" x2="800" y2="270" class="grid-line" />
    <line x1="400" y1="100" x2="1000" y2="270" class="grid-line" />

    <!-- Moving horizontal lines scrolled via transform translating Y -->
    <g transform="translate(0, 100)">
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-1" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-2" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-3" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-4" />
    </g>
  </g>

  <!-- Glowing Border Light Trail (Perimeter = 2136) -->
  <rect x="0.5" y="0.5" width="799" height="269" fill="none" class="border-trace" rx="8" filter="url(#glow-blue)" />

  <!-- Typography Content (Fade-in Groups) -->
  <text x="56" y="72" class="name fade-item delay-1">Gunti Prasanth Kumar</text>
  <text x="56" y="102" class="title fade-item delay-2">AI Engineer | Full Stack Developer</text>
  <text x="56" y="126" class="subtitle fade-item delay-3">Information Technology Undergraduate • Aditya University • Class of 2027</text>
  <text x="56" y="172" class="statement fade-item delay-4">Building production-ready AI products that solve real-world problems.</text>

  <!-- Interactive Links -->
  <g class="fade-item delay-5">
    <!-- Link 1: Portfolio -->
    <a href="https://prasanth-future-engine.netlify.app/" target="_blank" class="link">
      <text x="56" y="216" class="link-text">Portfolio ↗</text>
    </a>

    <!-- Link 2: LinkedIn -->
    <a href="https://www.linkedin.com/in/gunti-prasanth-kumar-68207027a/" target="_blank" class="link">
      <text x="168" y="216" class="link-text">LinkedIn ↗</text>
    </a>

    <!-- Link 3: Email -->
    <a href="mailto:prasanthgunti07@gmail.com" target="_blank" class="link">
      <text x="272" y="216" class="link-text">Email ↗</text>
    </a>
  </g>

  <!-- Vector AI Node Graphic (Native 3D Rotation via animateTransform) -->
  <g class="fade-item delay-4" transform="translate(670, 135)">
    <!-- Rotating outer dashboard rings -->
    <g>
      <circle cx="0" cy="0" r="40" stroke="#27272A" stroke-width="1" stroke-dasharray="6 6" fill="none" />
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="20s" repeatCount="indefinite" />
    </g>
    <g>
      <circle cx="0" cy="0" r="48" stroke="#1F2028" stroke-width="1" stroke-dasharray="40 10" fill="none" />
      <animateTransform attributeName="transform" type="rotate" from="360" to="0" dur="15s" repeatCount="indefinite" />
    </g>

    <!-- 3D Intersecting Lines (Constantly morphing using stroke-dashoffset) -->
    <g stroke="#27272A" stroke-width="1">
      <line x1="0" y1="0" x2="-25" y2="-20" />
      <line x1="0" y1="0" x2="25" y2="-15" />
      <line x1="0" y1="0" x2="-10" y2="25" />
    </g>

    <!-- Central Core (Glows and breathes) -->
    <circle cx="0" cy="0" r="8" fill="#3B82F6" filter="url(#glow-blue)">
      <animate attributeName="r" values="8;10;8" dur="4s" repeatCount="indefinite" />
    </circle>
    <circle cx="0" cy="0" r="14" stroke="#3B82F6" stroke-width="1" stroke-opacity="0.3" fill="none">
      <animate attributeName="r" values="12;16;12" dur="4s" repeatCount="indefinite" />
      <animate attributeName="stroke-opacity" values="0.3;0.6;0.3" dur="4s" repeatCount="indefinite" />
    </circle>

    <!-- Satellite Nodes (Scaling natively at their local offset) -->
    <g transform="translate(-25, -20)">
      <circle cx="0" cy="0" r="4.5" fill="#71717A">
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="3s" repeatCount="indefinite" />
      </circle>
    </g>
    <g transform="translate(25, -15)">
      <circle cx="0" cy="0" r="4.5" fill="#71717A">
        <animate attributeName="fill" values="#71717A;#10B981;#71717A" dur="3s" begin="1s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="3s" begin="1s" repeatCount="indefinite" />
      </circle>
    </g>
    <g transform="translate(-10, 25)">
      <circle cx="0" cy="0" r="4.5" fill="#71717A">
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" begin="2s" repeatCount="indefinite" />
        <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="3s" begin="2s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>
</svg>
