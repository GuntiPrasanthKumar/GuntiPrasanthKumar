<svg width="1600" height="1680" viewBox="0 0 1600 1680" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000000; }
    .border { stroke: #1C1C1E; stroke-width: 1; fill: none; }
    .accent-dot { fill: #3B82F6; }
    .accent-line { stroke: #1C1C1E; stroke-width: 1.5; }
    
    /* Layout Dividers */
    .divider { stroke: #1C1C1E; stroke-width: 1; }
    
    /* Typography Styles */
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 4px; }
    .project-title { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 26px; font-weight: 700; fill: #FFFFFF; letter-spacing: -0.5px; }
    .project-type { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.2px; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 400; fill: #A1A1AA; line-height: 1.6; }
    
    /* Tag Styling */
    .tag-bg { fill: #0A0A0A; stroke: #1C1C1E; stroke-width: 1; rx: 6px; }
    .tag-text { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 12px; font-weight: 600; fill: #EDEDED; text-anchor: middle; }

    /* Principles Typography */
    .principle-title { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 18px; font-weight: 700; fill: #FFFFFF; }
    
    /* Timeline Typography */
    .timeline-label { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #A1A1AA; }
    .timeline-highlight-bg { fill: #0A0A0A; stroke: #3B82F6; stroke-width: 1.5; rx: 8px; }
    .timeline-highlight-text { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 700; fill: #3B82F6; text-anchor: middle; }

    /* Interactive Link Transitions */
    .card-link { text-decoration: none; cursor: pointer; }
    .card-link:hover .project-title { fill: #3B82F6; transition: fill 0.25s ease; }
  </style>

  <!-- Background Canvas -->
  <rect width="1600" height="1680" class="bg"/>
  <rect x="0.5" y="0.5" width="1599" height="1679" rx="16" class="border"/>

  <!-- Left Symmetrical Anchor Line -->
  <line x1="112" y1="64" x2="112" y2="1616" class="accent-line" />
  <circle cx="112" cy="64" r="3" class="accent-dot" />

  <!-- ================= SECTION 01: FEATURED PROJECTS ================= -->
  <g>
    <text x="160" y="80" class="protocol">FEATURED PROJECTS</text>

    <!-- Project 1: AI Forensic Analyzer -->
    <a href="https://github.com/GuntiPrasanthKumar/AI-ForensicLab" target="_blank" class="card-link">
      <g>
        <text x="160" y="130" class="project-title">AI Forensic Analyzer ↗</text>
        <text x="160" y="156" class="project-type">Machine Learning / NLP Application</text>
        <text x="160" y="188" class="desc">Leveraging natural language processing and the Gemini API for advanced data analysis and forensic insights.</text>
        <!-- Tags -->
        <g transform="translate(160, 210)">
          <rect width="80" height="26" class="tag-bg" />
          <text x="40" y="17" class="tag-text">Python</text>
          
          <rect x="92" width="80" height="26" class="tag-bg" />
          <text x="132" y="17" class="tag-text">FastAPI</text>
          
          <rect x="184" width="110" height="26" class="tag-bg" />
          <text x="239" y="17" class="tag-text">Gemini API</text>
        </g>
      </g>
    </a>

    <!-- Project 2: ClimateSCOMC -->
    <a href="https://github.com/GuntiPrasanthKumar/SCOMC" target="_blank" class="card-link">
      <g transform="translate(0, 180)">
        <text x="160" y="130" class="project-title">ClimateSCOMC ↗</text>
        <text x="160" y="156" class="project-type">AI-powered Climate Intelligence Platform</text>
        <text x="160" y="188" class="desc">A predictive modeling and data visualization platform built to provide actionable climate intelligence.</text>
        <!-- Tags -->
        <g transform="translate(160, 210)">
          <rect width="80" height="26" class="tag-bg" />
          <text x="40" y="17" class="tag-text">Python</text>
          
          <rect x="92" width="110" height="26" class="tag-bg" />
          <text x="147" y="17" class="tag-text">ML Libraries</text>
          
          <rect x="214" width="90" height="26" class="tag-bg" />
          <text x="259" y="17" class="tag-text">Data Viz</text>
        </g>
      </g>
    </a>
  </g>

  <line x1="160" y1="490" x2="1440" y2="490" class="divider" />

  <!-- ================= SECTION 02: ENGINEERING PRINCIPLES ================= -->
  <g>
    <text x="160" y="540" class="protocol">ENGINEERING PRINCIPLES</text>

    <!-- 2x2 Grid -->
    <!-- Row 1 -->
    <g>
      <text x="160" y="590" class="principle-title">1. Solve Real Problems.</text>
      <text x="160" y="612" class="desc">Focus on utility and impact, not on unnecessary complexity.</text>
    </g>
    <g>
      <text x="800" y="590" class="principle-title">2. Simplicity Scales.</text>
      <text x="800" y="612" class="desc">Build robust, readable, and maintainable systems from day one.</text>
    </g>
    <!-- Row 2 -->
    <g transform="translate(0, 80)">
      <text x="160" y="590" class="principle-title">3. User-Centric Design.</text>
      <text x="160" y="612" class="desc">Build with the end-user in mind, optimizing for efficiency.</text>
    </g>
    <g transform="translate(0, 80)">
      <text x="800" y="590" class="principle-title">4. Ship and Iterate.</text>
      <text x="800" y="612" class="desc">Execution and rapid feedback are the absolute metrics of success.</text>
    </g>
  </g>

  <line x1="160" y1="790" x2="1440" y2="790" class="divider" />

  <!-- ================= SECTION 03: CURRENT JOURNEY ================= -->
  <g>
    <text x="160" y="840" class="protocol">CURRENT JOURNEY</text>

    <!-- Center Timeline Track -->
    <line x1="800" y1="890" x2="800" y2="1320" stroke="#1C1C1E" stroke-width="2" stroke-dasharray="4 4" />

    <!-- Timeline Nodes -->
    <!-- Node 1: ML -->
    <circle cx="800" cy="920" r="4" fill="#27272A" />
    <text x="770" y="925" class="timeline-label" text-anchor="end">Machine Learning</text>

    <!-- Node 2: DL -->
    <circle cx="800" cy="980" r="4" fill="#27272A" />
    <text x="830" y="985" class="timeline-label" text-anchor="start">Deep Learning</text>

    <!-- Node 3: LLMs -->
    <circle cx="800" cy="1040" r="4" fill="#27272A" />
    <text x="770" y="1045" class="timeline-label" text-anchor="end">Large Language Models (LLMs)</text>

    <!-- Node 4: RAG -->
    <circle cx="800" cy="1100" r="4" fill="#27272A" />
    <text x="830" y="1105" class="timeline-label" text-anchor="start">Retrieval-Augmented Generation (RAG)</text>

    <!-- Node 5: LangGraph -->
    <circle cx="800" cy="1160" r="4" fill="#27272A" />
    <text x="770" y="1165" class="timeline-label" text-anchor="end">LangGraph Agent Workflows</text>

    <!-- Node 6: MCP -->
    <circle cx="800" cy="1220" r="4" fill="#27272A" />
    <text x="830" y="1225" class="timeline-label" text-anchor="start">Model Context Protocol (MCP)</text>

    <!-- Node 7: Agentic AI (Highlight Capsule) -->
    <circle cx="800" cy="1280" r="5" fill="#3B82F6" />
    <g transform="translate(800, 1310)">
      <rect x="-90" y="0" width="180" height="36" class="timeline-highlight-bg" />
      <text x="0" y="22" class="timeline-highlight-text">Agentic AI</text>
    </g>
  </g>
</svg>
