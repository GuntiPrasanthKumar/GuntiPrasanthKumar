<svg width="800" height="490" viewBox="0 0 800 490" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles and native animations -->
  <style>
    .bg { fill: #0A0A0A; stroke: #27272A; stroke-width: 1; rx: 8px; }
    
    /* Sequential Fade-in Animations */
    .fade-item { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.4s; }

    .label-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #71717A; letter-spacing: 1.5px; }
    .item { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 500; fill: #EDEDED; text-anchor: middle; }
    .item-highlight { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 14px; font-weight: 700; fill: #3B82F6; text-anchor: middle; }
    
    .arrow { fill: #71717A; font-family: sans-serif; font-size: 14px; text-anchor: middle; }
    
    /* Tag/Capsule Glow */
    .tag { fill: #121212; stroke: #3B82F6; stroke-width: 1.5; rx: 6px; }

    /* Neon Border Light Trail Animation (Perimeter = 2460) */
    .border-trace {
      stroke: #3B82F6;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 150 2310;
      animation: traceJourney 6s linear infinite;
    }

    /* 3D Cyber-Grid Horizontals Scroll */
    .grid-line { stroke: #14141A; stroke-width: 1; }
    .horiz-1 { animation: horizScroll 4s linear infinite; }
    .horiz-2 { animation: horizScroll 4s linear infinite 1s; }
    .horiz-3 { animation: horizScroll 4s linear infinite 2s; }
    .horiz-4 { animation: horizScroll 4s linear infinite 3s; }
  </style>

  <!-- Defs & Hardware Accelerated Filters -->
  <defs>
    <!-- Glow Filters -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Section Label -->
  <text x="56" y="36" class="label-header">CURRENT JOURNEY</text>

  <!-- Card Background Base -->
  <rect x="0.5" y="48.5" width="799" height="430" class="bg" rx="8"/>

  <!-- ================= 3D CYBER-GRID BACKGROUND ================= -->
  <g opacity="0.3">
    <!-- Perspective lines originating from center horizon (400, 100) to bottom -->
    <line x1="400" y1="100" x2="-200" y2="478" class="grid-line" />
    <line x1="400" y1="100" x2="0" y2="478" class="grid-line" />
    <line x1="400" y1="100" x2="150" y2="478" class="grid-line" />
    <line x1="400" y1="100" x2="300" y2="478" class="grid-line" />
    <line x1="400" y1="100" x2="400" y2="478" class="grid-line" stroke-width="1.5" />
    <line x1="400" y1="100" x2="500" y2="478" class="grid-line" />
    <line x1="400" y1="100" x2="650" y2="478" class="grid-line" />
    <line x1="400" y1="100" x2="800" y2="478" class="grid-line" />
    <line x1="400" y1="100" x2="1000" y2="478" class="grid-line" />

    <!-- Moving horizontal lines scrolled via Y translation -->
    <g transform="translate(0, 100)">
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-1" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-2" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-3" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-4" />
    </g>
  </g>

  <!-- Glowing Border Light Trail (Perimeter = 2460) -->
  <rect x="0.5" y="48.5" width="799" height="430" fill="none" class="border-trace" rx="8" filter="url(#glow-blue)" />

  <!-- Timeline Flow with Cascading Arrow Animations -->
  <g class="fade-item delay-2">
    <!-- Machine Learning -->
    <text x="400" y="90" class="item">Machine Learning</text>
    <g transform="translate(400, 118)">
      <text x="0" y="0" class="arrow">↓
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,5; 0,0" dur="3s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- Deep Learning -->
    <text x="400" y="146" class="item">Deep Learning</text>
    <g transform="translate(400, 174)">
      <text x="0" y="0" class="arrow">↓
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,5; 0,0" dur="3s" begin="0.3s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" begin="0.3s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- LLMs -->
    <text x="400" y="202" class="item">LLMs</text>
    <g transform="translate(400, 230)">
      <text x="0" y="0" class="arrow">↓
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,5; 0,0" dur="3s" begin="0.6s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" begin="0.6s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- RAG -->
    <text x="400" y="258" class="item">RAG</text>
    <g transform="translate(400, 286)">
      <text x="0" y="0" class="arrow">↓
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,5; 0,0" dur="3s" begin="0.9s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" begin="0.9s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- LangGraph -->
    <text x="400" y="314" class="item">LangGraph</text>
    <g transform="translate(400, 342)">
      <text x="0" y="0" class="arrow">↓
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,5; 0,0" dur="3s" begin="1.2s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" begin="1.2s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- MCP -->
    <text x="400" y="370" class="item">MCP</text>
    <g transform="translate(400, 398)">
      <text x="0" y="0" class="arrow">↓
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,5; 0,0" dur="3s" begin="1.5s" repeatCount="indefinite" />
        <animate attributeName="fill" values="#71717A;#3B82F6;#71717A" dur="3s" begin="1.5s" repeatCount="indefinite" />
      </text>
    </g>

    <!-- Agentic AI (Highlight Glowing Capsule) -->
    <g>
      <rect x="330" y="420" width="140" height="32" class="tag" filter="url(#glow-blue)" rx="6">
        <animate attributeName="stroke" values="#3B82F6;#10B981;#3B82F6" dur="4s" repeatCount="indefinite" />
      </rect>
      <text x="400" y="441" class="item-highlight">Agentic AI
        <animate attributeName="fill" values="#3B82F6;#10B981;#3B82F6" dur="4s" repeatCount="indefinite" />
      </text>
    </g>
  </g>
</svg>
