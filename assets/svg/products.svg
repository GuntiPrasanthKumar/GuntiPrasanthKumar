<svg width="1600" height="1800" viewBox="0 0 1600 1800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000000; }
    .border { stroke: #1C1C1E; stroke-width: 1; fill: none; }
    .card { fill: #0A0A0C; stroke: #1C1C1E; stroke-width: 1; rx: 16px; }
    
    /* Typography */
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 4px; }
    .title-large { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 48px; font-weight: 800; fill: #FFFFFF; letter-spacing: -2px; }
    .title-medium { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 34px; font-weight: 800; fill: #FFFFFF; letter-spacing: -1px; }
    .desc { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 400; fill: #A1A1AA; line-height: 1.6; }
    .desc-small { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 400; fill: #A1A1AA; line-height: 1.6; }
    
    .tech-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 11px; font-weight: 700; fill: #52525B; letter-spacing: 2px; }
    .tech-list { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 600; fill: #D4D4D8; }
    
    .link { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 600; fill: #8A8A93; transition: fill 0.25s ease; cursor: pointer; text-decoration: none; }
    .link:hover { fill: #FFFFFF; }
    
    .tag-border { fill: #0A0A0C; stroke: #10B981; stroke-width: 1.2; rx: 6px; }
    .tag-text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 10px; font-weight: 700; fill: #10B981; letter-spacing: 1.5px; text-anchor: middle; }
  </style>

  <!-- Background Canvas -->
  <rect width="1600" height="1800" class="bg"/>
  <rect x="0.5" y="0.5" width="1599" height="1799" rx="16" class="border"/>

  <!-- ================= PRODUCT 01: SkillTrove (FLAGSHIP) ================= -->
  <g>
    <rect x="80" y="80" width="1440" height="540" rx="16" class="card" />
    <text x="120" y="130" class="protocol">AI LEARNING PLATFORM</text>
    
    <!-- Flagship Badge -->
    <rect x="360" y="112" width="160" height="26" class="tag-border" />
    <text x="440" y="129" class="tag-text">FLAGSHIP PROJECT</text>
    
    <text x="120" y="185" class="title-large">SkillTrove</text>
    
    <text x="120" y="240" class="desc">An intelligent learning and assessment ecosystem combining adaptive learning, AI-powered question</text>
    <text x="120" y="264" class="desc">generation, Bloom's Taxonomy evaluation, face recognition, AI-based online exam proctoring,</text>
    <text x="120" y="288" class="desc">coding assessments, performance analytics, and personalized learning experiences.</text>

    <!-- Technology -->
    <text x="120" y="360" class="tech-header">TECHNOLOGY</text>
    <text x="120" y="385" class="tech-list">React  •  Node.js  •  MongoDB  •  Gemini API  •  TensorFlow.js  •  FastAPI</text>

    <!-- Links -->
    <g>
      <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank">
        <text x="120" y="460" class="link">Source Repository ↗</text>
      </a>
      <a href="https://github.com/GuntiPrasanthKumar/SKILLTROVEMAX" target="_blank">
        <text x="320" y="460" class="link">Active Dashboard ↗</text>
      </a>
    </g>
  </g>

  <!-- ================= ROW 2 ================= -->
  <!-- PRODUCT 02: AI Forensic Analyzer -->
  <g>
    <rect x="80" y="640" width="710" height="500" rx="16" class="card" />
    <text x="120" y="690" class="protocol">AI CONTENT DETECTION</text>
    
    <text x="120" y="745" class="title-medium">AI Forensic Analyzer</text>
    
    <text x="120" y="800" class="desc-small">A machine learning application that analyzes text using</text>
    <text x="120" y="822" class="desc-small">advanced linguistic features, NLP techniques, and</text>
    <text x="120" y="844" class="desc-small">statistical scoring to distinguish AI-generated content</text>
    <text x="120" y="866" class="desc-small">from human writing.</text>

    <!-- Technology -->
    <text x="120" y="930" class="tech-header">TECHNOLOGY</text>
    <text x="120" y="955" class="tech-list">Python  •  FastAPI  •  Transformers  •  Gemini API  •  NLP</text>

    <!-- Links -->
    <g>
      <a href="https://github.com/GuntiPrasanthKumar/AI-ForensicLab" target="_blank">
        <text x="120" y="1030" class="link">Source Repository ↗</text>
      </a>
      <a href="https://github.com/GuntiPrasanthKumar/AI-ForensicLab" target="_blank">
        <text x="320" y="1030" class="link">Interactive Demo ↗</text>
      </a>
    </g>
  </g>

  <!-- PRODUCT 03: ClimateSCOMC -->
  <g>
    <rect x="810" y="640" width="710" height="500" rx="16" class="card" />
    <text x="850" y="690" class="protocol">CLIMATE INTELLIGENCE</text>
    
    <text x="850" y="745" class="title-medium">ClimateSCOMC</text>
    
    <text x="850" y="800" class="desc-small">An AI-powered platform for climate prediction,</text>
    <text x="850" y="822" class="desc-small">environmental monitoring, and intelligent decision</text>
    <text x="850" y="844" class="desc-small">support through predictive analytics and interactive</text>
    <text x="850" y="866" class="desc-small">model dashboards.</text>

    <!-- Technology -->
    <text x="850" y="930" class="tech-header">TECHNOLOGY</text>
    <text x="850" y="955" class="tech-list">Python  •  FastAPI  •  Machine Learning  •  Visualization</text>

    <!-- Links -->
    <g>
      <a href="https://github.com/GuntiPrasanthKumar/SCOMC" target="_blank">
        <text x="850" y="1030" class="link">Source Repository ↗</text>
      </a>
      <a href="https://github.com/GuntiPrasanthKumar/SCOMC" target="_blank">
        <text x="1050" y="1030" class="link">Model Dashboard ↗</text>
      </a>
    </g>
  </g>

  <!-- ================= PRODUCT 04: Portfolio ================= -->
  <g>
    <rect x="80" y="1160" width="1440" height="460" rx="16" class="card" />
    <text x="120" y="1210" class="protocol">PERSONAL ENGINEERING PLATFORM</text>
    
    <text x="120" y="1265" class="title-medium">Portfolio</text>
    
    <text x="120" y="1320" class="desc">A premium digital portfolio showcasing AI engineering projects, software architecture, technical</text>
    <text x="120" y="1344" class="desc">expertise, and product development philosophy.</text>

    <!-- Technology -->
    <text x="120" y="1410" class="tech-header">TECHNOLOGY</text>
    <text x="120" y="1435" class="tech-list">React  •  Tailwind CSS  •  Framer Motion</text>

    <!-- Links -->
    <g>
      <a href="https://github.com/GuntiPrasanthKumar/Prasanth-Future-Engine" target="_blank">
        <text x="120" y="1510" class="link">Source Repository ↗</text>
      </a>
      <a href="https://prasanth-future-engine.netlify.app/" target="_blank">
        <text x="320" y="1510" class="link">Live Platform ↗</text>
