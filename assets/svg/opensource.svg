  <rect x="1120" y="557" width="18" height="77" rx="3" fill="#1A1A1D" opacity="0.38"/>
  <rect x="1164" y="570" width="18" height="64" rx="3" fill="#1A1A1D" opacity="0.3"/>
  <rect x="1188" y="565" width="18" height="69" rx="3" fill="#1A1A1D" opacity="0.28"/>
  <rect x="1212" y="568" width="18" height="66" rx="3" fill="#1A1A1D" opacity="0.3"/>
  <rect x="1236" y="562" width="18" height="72" rx="3" fill="#1A1A1D" opacity="0.28"/>
  <rect x="1280" y="575" width="18" height="59" rx="3" fill="#1A1A1D" opacity="0.22"/>
  <rect x="1304" y="570" width="18" height="64" rx="3" fill="#1A1A1D" opacity="0.2"/>
  <rect x="1328" y="573" width="18" height="61" rx="3" fill="#1A1A1D" opacity="0.22"/>
  <rect x="1352" y="567" width="18" height="67" rx="3" fill="#1A1A1D" opacity="0.2"/>
  <rect x="1396" y="580" width="18" height="54" rx="3" fill="#1A1A1D" opacity="0.15"/>
  <rect x="1420" y="576" width="18" height="58" rx="3" fill="#1A1A1D" opacity="0.14"/>
  <rect x="1444" y="579" width="18" height="55" rx="3" fill="#1A1A1D" opacity="0.15"/>
  <rect x="1468" y="573" width="18" height="61" rx="3" fill="#1A1A1D" opacity="0.14"/>

  <!-- Baseline -->
  <line x1="120" y1="634" x2="1490" y2="634" stroke="#1A1A1D" stroke-width="1"/>

  <!-- "CURRENT" label on peak -->
  <line x1="878" y1="474" x2="878" y2="454" stroke="#3B82F6" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="878" y="448" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',monospace" font-size="10" font-weight="700" fill="#3B82F6" letter-spacing="1" text-anchor="middle">NOW</text>

  <!-- ====== ENGINEERING VALUES ====== -->
  <rect x="80" y="694" width="1440" height="186" rx="16" fill="#0B0B0B" stroke="#222222" stroke-width="1"/>
  <text x="122" y="738" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',monospace" font-size="11" font-weight="700" fill="#3D3D45" letter-spacing="4">ENGINEERING VALUES</text>

  <!-- Col 1 -->
  <line x1="122" y1="772" x2="140" y2="772" stroke="#3B82F6" stroke-width="2.5"/>
  <text x="150" y="777" font-family="-apple-system,BlinkMacSystemFont,'Outfit','Segoe UI',sans-serif" font-size="15" font-weight="700" fill="#FFFFFF">Problem Solving</text>
  <text x="150" y="800" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#9A9A9A">Building systems that solve</text>
  <text x="150" y="820" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#9A9A9A">meaningful real-world problems.</text>
  <text x="150" y="848" font-family="-apple-system,BlinkMacSystemFont,'Inter','Segoe UI',sans-serif" font-size="13" font-weight="400" fill="#9A9A9A">Not demo code. Real products.</text>

  <!-- Col 2 -->
