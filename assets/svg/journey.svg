<svg width="1600" height="520" viewBox="0 0 1600 520" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    .bg { fill: #000000; }
    .border { stroke: #1C1C1E; stroke-width: 1; fill: none; }
    .accent-dot { fill: #3B82F6; }
    .accent-line { stroke: #1C1C1E; stroke-width: 1.5; }
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 4px; }
    
    /* Timeline Typography */
    .timeline-label { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 500; fill: #A1A1AA; }
    .timeline-highlight-bg { fill: #0A0A0C; stroke: #3B82F6; stroke-width: 1.5; rx: 8px; }
    .timeline-highlight-text { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 14px; font-weight: 700; fill: #3B82F6; text-anchor: middle; }
    .bullet-node { fill: #27272A; }
  </style>

  <!-- Background Canvas -->
  <rect width="1600" height="520" class="bg"/>
  <rect x="0.5" y="0.5" width="1599" height="519" rx="16" class="border"/>

  <!-- Left Symmetrical Anchor Line -->
  <line x1="112" y1="48" x2="112" y2="472" class="accent-line" />
  <circle cx="112" cy="48" r="3" class="accent-dot" />

  <!-- Section Label -->
  <text x="160" y="64" class="protocol">CURRENT JOURNEY</text>

  <!-- Center Timeline Track -->
  <line x1="800" y1="90" x2="800" y2="390" stroke="#1C1C1E" stroke-width="2" stroke-dasharray="4 4" />

  <!-- Timeline Nodes -->
  <!-- Node 1: ML -->
  <circle cx="800" cy="110" r="4" class="bullet-node" />
  <text x="770" y="115" class="timeline-label" text-anchor="end">Machine Learning</text>

  <!-- Node 2: DL -->
  <circle cx="800" cy="155" r="4" class="bullet-node" />
  <text x="830" y="160" class="timeline-label" text-anchor="start">Deep Learning</text>

  <!-- Node 3: LLMs -->
  <circle cx="800" cy="200" r="4" class="bullet-node" />
  <text x="770" y="205" class="timeline-label" text-anchor="end">Large Language Models (LLMs)</text>

  <!-- Node 4: RAG -->
  <circle cx="800" cy="245" r="4" class="bullet-node" />
  <text x="830" y="250" class="timeline-label" text-anchor="start">Retrieval-Augmented Generation (RAG)</text>

  <!-- Node 5: LangGraph -->
  <circle cx="800" cy="290" r="4" class="bullet-node" />
  <text x="770" y="295" class="timeline-label" text-anchor="end">LangGraph Agent Workflows</text>

  <!-- Node 6: MCP -->
  <circle cx="800" cy="335" r="4" class="bullet-node" />
  <text x="830" y="340" class="timeline-label" text-anchor="start">Model Context Protocol (MCP)</text>

  <!-- Node 7: Agentic AI (Highlight Capsule) -->
  <circle cx="800" cy="380" r="5" fill="#3B82F6" />
  <g transform="translate(800, 410)">
    <rect x="-90" y="0" width="180" height="36" class="timeline-highlight-bg" />
    <text x="0" y="22" class="timeline-highlight-text">Agentic AI</text>
  </g>
</svg>
