<svg width="800" height="230" viewBox="0 0 800 230" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Styles and native animations -->
  <style>
    .bg { fill: #0A0A0A; stroke: #27272A; stroke-width: 1; rx: 8px; }
    
    /* Sequential Fade-in Animations */
    .fade-item { opacity: 0; animation: fadeIn 0.8s ease forwards; }
    .delay-1 { animation-delay: 0.1s; }
    .delay-2 { animation-delay: 0.3s; }

    .label-header { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 11px; font-weight: 700; fill: #71717A; letter-spacing: 1.5px; }
    .principle-item { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; font-size: 13px; font-weight: 400; fill: #A1A1AA; }
    
    /* Hover principles highlighting */
    .highlight { fill: #EDEDED; font-weight: 600; transition: fill 0.3s; }
    .principle-group { transition: transform 0.2s; cursor: pointer; }
    .principle-group:hover { transform: translateX(6px); }
    .principle-group:hover .highlight { fill: #3B82F6; }

    /* Seamless Glowing Blue Border Trace (Perimeter = 1958) */
    .border-trace {
      stroke: #3B82F6;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-dasharray: 150 1808;
      animation: tracePrinciples 6s linear infinite;
    }

    /* 3D Cyber-Grid Horizontals Scroll */
    .grid-line { stroke: #14141A; stroke-width: 1; }
    .horiz-1 { animation: horizScroll 4s linear infinite; }
    .horiz-2 { animation: horizScroll 4s linear infinite 1s; }
    .horiz-3 { animation: horizScroll 4s linear infinite 2s; }
    .horiz-4 { animation: horizScroll 4s linear infinite 3s; }
  </style>

  <!-- Defs & Hardware Accelerated Filters -->
  <defs>
    <!-- Blue Neon Glow Filter -->
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <!-- Background Grid Pattern -->
    <pattern id="grid" width="24" height="24" patternUnits="userSpaceOnUse">
      <path d="M 24 0 L 0 0 0 24" fill="none" stroke="#16161D" stroke-width="0.7" />
    </pattern>
  </defs>

  <!-- Section Label -->
  <text x="56" y="36" class="label-header">ENGINEERING PRINCIPLES</text>

  <!-- Card Background Base -->
  <rect x="0.5" y="48.5" width="799" height="179" class="bg" rx="8"/>

  <!-- ================= 3D CYBER-GRID BACKGROUND ================= -->
  <g opacity="0.3">
    <!-- Perspective lines originating from center horizon (400, 100) to bottom -->
    <line x1="400" y1="100" x2="-200" y2="228" class="grid-line" />
    <line x1="400" y1="100" x2="0" y2="228" class="grid-line" />
    <line x1="400" y1="100" x2="150" y2="228" class="grid-line" />
    <line x1="400" y1="100" x2="300" y2="228" class="grid-line" />
    <line x1="400" y1="100" x2="400" y2="228" class="grid-line" stroke-width="1.5" />
    <line x1="400" y1="100" x2="500" y2="228" class="grid-line" />
    <line x1="400" y1="100" x2="650" y2="228" class="grid-line" />
    <line x1="400" y1="100" x2="800" y2="228" class="grid-line" />
    <line x1="400" y1="100" x2="1000" y2="228" class="grid-line" />

    <!-- Moving horizontal lines scrolled via Y translation -->
    <g transform="translate(0, 100)">
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-1" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-2" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-3" />
      <line x1="-200" y1="0" x2="1000" y2="0" class="grid-line horiz-4" />
    </g>
  </g>

  <!-- Glowing Border Light Trail (Perimeter = 1958) -->
  <rect x="0.5" y="48.5" width="799" height="179" fill="none" class="border-trace" rx="8" filter="url(#glow-blue)" />

  <!-- Principles List with Interactive Groups & Custom Vector Diamonds -->
  <g class="fade-item delay-2">
    <!-- Principle 1 -->
    <g class="principle-group">
      <!-- Native scale and glow diamond -->
      <g transform="translate(36, 84)">
        <polygon points="0,-4 4,0 0,4 -4,0" fill="#3B82F6" filter="url(#glow-blue)">
          <animate attributeName="fill" values="#3B82F6;#10B981;#3B82F6" dur="4s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="4s" repeatCount="indefinite" />
        </polygon>
      </g>
      <text x="56" y="88" class="principle-item">
        <tspan class="highlight">1. Solve Real Problems.</tspan> Focus on utility and impact, not on unnecessary complexity.
      </text>
    </g>

    <!-- Principle 2 -->
    <g class="principle-group" transform="translate(0, 30)">
      <g transform="translate(36, 84)">
        <polygon points="0,-4 4,0 0,4 -4,0" fill="#3B82F6" filter="url(#glow-blue)">
          <animate attributeName="fill" values="#3B82F6;#10B981;#3B82F6" dur="4s" begin="1s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="4s" begin="1s" repeatCount="indefinite" />
        </polygon>
      </g>
      <text x="56" y="88" class="principle-item">
        <tspan class="highlight">2. Simplicity Scales.</tspan> Build robust, readable, and maintainable systems from day one.
      </text>
    </g>

    <!-- Principle 3 -->
    <g class="principle-group" transform="translate(0, 60)">
      <g transform="translate(36, 84)">
        <polygon points="0,-4 4,0 0,4 -4,0" fill="#3B82F6" filter="url(#glow-blue)">
          <animate attributeName="fill" values="#3B82F6;#10B981;#3B82F6" dur="4s" begin="2s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="4s" begin="2s" repeatCount="indefinite" />
        </polygon>
      </g>
      <text x="56" y="88" class="principle-item">
        <tspan class="highlight">3. User-Centric Design.</tspan> Build with the end-user in mind, optimizing for efficiency.
      </text>
    </g>

    <!-- Principle 4 -->
    <g class="principle-group" transform="translate(0, 90)">
      <g transform="translate(36, 84)">
        <polygon points="0,-4 4,0 0,4 -4,0" fill="#3B82F6" filter="url(#glow-blue)">
          <animate attributeName="fill" values="#3B82F6;#10B981;#3B82F6" dur="4s" begin="3s" repeatCount="indefinite" />
          <animateTransform attributeName="transform" type="scale" values="1;1.3;1" dur="4s" begin="3s" repeatCount="indefinite" />
        </polygon>
      </g>
      <text x="56" y="88" class="principle-item">
        <tspan class="highlight">4. Ship and Iterate.</tspan> Execution and rapid feedback are the absolute metrics of success.
      </text>
    </g>
  </g>
</svg>
