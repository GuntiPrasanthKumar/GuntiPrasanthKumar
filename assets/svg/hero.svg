<svg width="1600" height="700" viewBox="0 0 1600 700" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background Radial Glow -->
    <radialGradient id="glow" cx="80%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E3A8A" stop-opacity="0.25" />
      <stop offset="40%" stop-color="#0F172A" stop-opacity="0.08" />
      <stop offset="100%" stop-color="#050505" stop-opacity="0" />
      <animate attributeName="cx" values="80%;75%;85%;80%" dur="20s" repeatCount="indefinite" />
      <animate attributeName="cy" values="50%;45%;55%;50%" dur="20s" repeatCount="indefinite" />
    </radialGradient>

    <!-- Grid Shimmer Mask -->
    <radialGradient id="grid-mask" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.8" />
      <stop offset="40%" stop-color="#FFFFFF" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.05" />
      <animate attributeName="cx" values="30%;70%;30%" dur="25s" repeatCount="indefinite" />
      <animate attributeName="cy" values="30%;70%;30%" dur="25s" repeatCount="indefinite" />
    </radialGradient>

    <!-- Moving Line Glow Gradient -->
    <linearGradient id="line-glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0" />
      <stop offset="50%" stop-color="#3B82F6" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0" />
    </linearGradient>

    <!-- Mask Reference -->
    <mask id="grid-mask-ref">
      <rect width="1600" height="700" fill="url(#grid-mask)" />
    </mask>
  </defs>

  <style>
    .bg { fill: #050505; }
    .border { stroke: #222222; stroke-width: 1; fill: none; }
    
    /* Typography System */
    .protocol { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, monospace; font-size: 13px; font-weight: 700; fill: #52525B; letter-spacing: 5px; }
    .name-line { font-family: -apple-system, BlinkMacSystemFont, "Outfit", "Segoe UI", sans-serif; font-size: 96px; font-weight: 800; fill: #FFFFFF; letter-spacing: -3px; line-height: 0.9; }
    .subtitle { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 20px; font-weight: 600; fill: #3B82F6; letter-spacing: -0.5px; }
    .mission { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 18px; font-weight: 400; fill: #B7B7B7; line-height: 1.5; }
    .academic { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 400; fill: #52525B; }
    
    .link { font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif; font-size: 15px; font-weight: 600; fill: #8A8A93; transition: fill 0.25s ease; cursor: pointer; text-decoration: none; }
    .link:hover { fill: #FFFFFF; }
  </style>

  <!-- Canvas Base -->
  <rect width="1600" height="700" class="bg"/>
  
  <!-- Subtle Radial Glow Background -->
  <rect width="1600" height="700" fill="url(#glow)" />

  <!-- Animated Grid Overlay -->
  <g mask="url(#grid-mask-ref)">
    <!-- Vertical Grid Lines -->
    <path d="M 80,0 V 700 M 160,0 V 700 M 240,0 V 700 M 320,0 V 700 M 400,0 V 700 M 480,0 V 700 M 560,0 V 700 M 640,0 V 700 M 720,0 V 700 M 800,0 V 700 M 880,0 V 700 M 960,0 V 700 M 1040,0 V 700 M 1120,0 V 700 M 1200,0 V 700 M 1280,0 V 700 M 1360,0 V 700 M 1440,0 V 700 M 1520,0 V 700" stroke="#1C1C1E" stroke-width="0.5" />
    <!-- Horizontal Grid Lines -->
    <path d="M 0,80 H 1600 M 0,160 H 1600 M 0,240 H 1600 M 0,320 H 1600 M 0,400 H 1600 M 0,480 H 1600 M 0,560 H 1600 M 0,640 H 1600" stroke="#1C1C1E" stroke-width="0.5" />
  </g>

  <!-- Tiny Floating Particles -->
  <g>
    <circle cx="200" cy="180" r="1.5" fill="#3B82F6" opacity="0.3">
      <animate attributeName="cy" values="180;150;180" dur="8s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="8s" repeatCount="indefinite" />
    </circle>
    <circle cx="850" cy="120" r="1.5" fill="#FFFFFF" opacity="0.2">
      <animate attributeName="cy" values="120;140;120" dur="10s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.2;0.5;0.2" dur="10s" repeatCount="indefinite" />
    </circle>
    <circle cx="1400" cy="220" r="1" fill="#3B82F6" opacity="0.4">
      <animate attributeName="cy" values="220;190;220" dur="7s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.4;0.8;0.4" dur="7s" repeatCount="indefinite" />
    </circle>
    <circle cx="950" cy="550" r="2" fill="#3B82F6" opacity="0.15">
      <animate attributeName="cy" values="550;530;550" dur="12s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="12s" repeatCount="indefinite" />
    </circle>
  </g>

  <!-- Left Symmetrical Accent Line -->
  <line x1="80" y1="80" x2="80" y2="620" stroke="#222222" stroke-width="1.5" />
  <circle cx="80" cy="80" r="3" fill="#3B82F6" />

  <!-- ================= LEFT CONTENT PANEL ================= -->
  <g>
    <text x="120" y="105" class="protocol">SYSTEM INITIALIZED</text>
    
    <text x="120" y="195" class="name-line">GUNTI</text>
    <text x="120" y="275" class="name-line">PRASANTH</text>
    <text x="120" y="355" class="name-line">KUMAR</text>
    
    <text x="120" y="420" class="subtitle">AI Engineer  •  Full Stack Developer</text>
    
    <text x="120" y="465" class="mission">Building production-ready AI systems that solve real-world problems.</text>
    
    <text x="120" y="525" class="academic">Information Technology Undergraduate</text>
    <text x="120" y="550" class="academic">Aditya University</text>
    <text x="120" y="575" class="academic">Class of 2027</text>

    <!-- Bottom Navigation Links -->
    <g>
      <a href="https://prasanth-future-engine.netlify.app/" target="_blank">
        <text x="120" y="640" class="link">Portfolio ↗</text>
      </a>
      <a href="https://github.com/GuntiPrasanthKumar" target="_blank">
        <text x="250" y="640" class="link">GitHub ↗</text>
      </a>
      <a href="https://www.linkedin.com/in/gunti-prasanth-kumar-68207027a/" target="_blank">
        <text x="360" y="640" class="link">LinkedIn ↗</text>
      </a>
      <a href="mailto:prasanthgunti07@gmail.com" target="_blank">
        <text x="480" y="640" class="link">Email ↗</text>
      </a>
    </g>
  </g>

  <!-- ================= RIGHT SIDE: ABSTRACT AI VISUALIZATION ================= -->
  <g transform="translate(100, 20)">
    <!-- Passive Connection Lines -->
    <path d="M 1000,180 L 1150,130 M 1150,130 L 1320,220 M 1320,220 L 1380,420 M 1380,420 L 1230,520 M 1230,520 L 1080,470 M 1080,470 L 1000,180 M 1080,470 L 1150,130 M 1230,520 L 1150,320 M 1150,320 L 1320,220 M 1000,180 L 1150,320 M 1080,470 L 1150,320 M 1150,320 L 1380,420" stroke="#18181B" stroke-width="1.5" />

    <!-- Animated Glowing Signal Flows -->
    <line x1="1000" y1="180" x2="1150" y2="130" stroke="url(#line-glow)" stroke-width="2" stroke-dasharray="20 120">
      <animate attributeName="stroke-dashoffset" values="140;0" dur="4s" repeatCount="indefinite" />
    </line>
    <line x1="1320" y1="220" x2="1380" y2="420" stroke="url(#line-glow)" stroke-width="2" stroke-dasharray="20 180">
      <animate attributeName="stroke-dashoffset" values="200;0" dur="5s" repeatCount="indefinite" />
    </line>
    <line x1="1080" y1="470" x2="1150" y2="320" stroke="url(#line-glow)" stroke-width="2" stroke-dasharray="15 130">
      <animate attributeName="stroke-dashoffset" values="145;0" dur="3s" repeatCount="indefinite" />
    </line>
    <line x1="1150" y1="320" x2="1320" y2="220" stroke="url(#line-glow)" stroke-width="2" stroke-dasharray="25 150">
      <animate attributeName="stroke-dashoffset" values="175;0" dur="4.5s" repeatCount="indefinite" />
    </line>

    <!-- Node Points -->
    <!-- Node 1 -->
    <g>
      <circle cx="1000" cy="180" r="10" fill="none" stroke="#27272A" stroke-width="1" />
      <circle cx="1000" cy="180" r="4.5" fill="#3B82F6" />
    </g>
    <!-- Node 2 -->
    <g>
      <circle cx="1150" cy="130" r="14" fill="none" stroke="#27272A" stroke-width="1" opacity="0.4">
        <animate attributeName="r" values="8;20;8" dur="6s" repeatCount="indefinite" />
      </circle>
      <circle cx="1150" cy="130" r="4.5" fill="#FFFFFF" />
    </g>
    <!-- Node 3 -->
    <g>
      <circle cx="1320" cy="220" r="10" fill="none" stroke="#27272A" stroke-width="1" />
      <circle cx="1320" cy="220" r="4.5" fill="#3B82F6" />
    </g>
    <!-- Node 4 -->
    <g>
      <circle cx="1380" cy="420" r="12" fill="none" stroke="#27272A" stroke-width="1" />
      <circle cx="1380" cy="420" r="4.5" fill="#FFFFFF" />
    </g>
    <!-- Node 5 -->
    <g>
      <circle cx="1230" cy="520" r="10" fill="none" stroke="#27272A" stroke-width="1" />
      <circle cx="1230" cy="520" r="4.5" fill="#3B82F6" />
    </g>
    <!-- Node 6 -->
    <g>
      <circle cx="1080" cy="470" r="16" fill="none" stroke="#27272A" stroke-width="1" opacity="0.4">
        <animate attributeName="r" values="10;24;10" dur="5s" repeatCount="indefinite" />
      </circle>
      <circle cx="1080" cy="470" r="4.5" fill="#FFFFFF" />
    </g>
    <!-- Center Hub Node -->
    <g>
      <circle cx="1150" cy="320" r="22" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3">
        <animate attributeName="r" values="14;30;14" dur="4s" repeatCount="indefinite" />
        <animate attributeName="stroke-opacity" values="0.3;0;0.3" dur="4s" repeatCount="indefinite" />
      </circle>
      <circle cx="1150" cy="320" r="6" fill="#3B82F6" />
    </g>
  </g>

  <!-- Outer Border Container Shell -->
  <rect x="0.5" y="0.5" width="1599" height="699" rx="16" class="border"/>
</svg>
